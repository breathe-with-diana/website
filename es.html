<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Respira con Diana — próximamente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bone:#F4EFE6;--cream:#EFE7D8;--terracotta:#C97B5A;--umber:#5B4636;--ochre:#D4A24C;
      --muted:rgba(91,70,54,.62);--hairline:rgba(91,70,54,.14);
      --serif:'Cormorant Garamond','Recoleta',Georgia,serif;--sans:'Inter',system-ui,sans-serif;}
    *{box-sizing:border-box}html,body{margin:0;padding:0}
    body{background:var(--bone);color:var(--umber);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;
      min-height:100vh;display:flex;flex-direction:column}
    .nav{border-bottom:1px solid var(--hairline)}
    .nav-inner{max-width:1140px;margin:0 auto;padding:16px 32px;display:flex;align-items:center;gap:18px}
    .logo-lockup{display:flex;align-items:center;gap:10px;margin-right:auto;text-decoration:none}
    .logo-lockup svg{width:30px;height:30px;display:block}
    .logo-word{font-family:var(--serif);font-size:23px;font-weight:500;color:var(--umber)}
    .lang{font-family:var(--sans);font-size:12px;letter-spacing:.08em;color:var(--muted);border:1px solid var(--hairline);
      border-radius:999px;padding:5px 11px}
    .lang b{color:var(--umber)}.lang a{color:var(--muted);text-decoration:none}.lang a:hover{color:var(--umber)}
    main{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:60px 28px}
    .eyebrow{font-size:12px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--terracotta);margin-bottom:18px}
    h1{font-family:var(--serif);font-weight:500;font-size:48px;line-height:1.08;margin:0 0 18px}
    p{font-size:17px;color:var(--muted);max-width:440px;margin:0 auto 28px}
    .back{font-family:var(--sans);font-size:14px;font-weight:500;text-decoration:none;color:var(--bone);background:var(--terracotta);
      border-radius:999px;padding:11px 22px;display:inline-block}
    footer{text-align:center;padding:26px;font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a class="logo-lockup" href="index.html">
        <svg viewBox="0 0 100 100" fill="none" stroke="#5B4636" stroke-linecap="round" stroke-linejoin="round">
          <path d="M44 22 C28 40 28 60 44 78" stroke-width="7.5"/>
          <path d="M66 33 C78 45 78 55 66 67" stroke-width="4.2"/>
        </svg>
        <span class="logo-word">Respira con Diana</span>
      </a>
      <span class="lang" title="Idioma"><a href="index.html">EN</a> · <b>ES</b></span>
    </div>
  </header>
  <main>
    <div>
      <div class="eyebrow">Próximamente</div>
      <h1>Volver a casa,<br>a tu cuerpo.</h1>
      <p>La versión en español está en camino. Mientras tanto, puedes ver la página en inglés.</p>
      <a class="back" href="index.html">← Ver en inglés</a>
    </div>
  </main>
  <footer>Respira con Diana · respiracondiana.com</footer>
</body>
</html>
